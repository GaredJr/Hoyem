<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Omni storyline preview</title>
  <desc id="desc">Stylized story card with three act panels and a connecting arc.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171412"/>
      <stop offset="100%" stop-color="#100f0e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#221d1a"/>
      <stop offset="100%" stop-color="#181513"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="36" fill="url(#bg)"/>
  <path d="M168 520c111-127 199-197 311-197 94 0 147 57 232 57 92 0 175-72 320-215" fill="none" stroke="#c8ae93" stroke-width="12" stroke-linecap="round"/>
  <circle cx="226" cy="456" r="15" fill="#e2c6ab"/>
  <circle cx="611" cy="381" r="15" fill="#e2c6ab"/>
  <circle cx="986" cy="167" r="15" fill="#e2c6ab"/>
  <rect x="116" y="172" width="274" height="420" rx="28" fill="url(#panel)" stroke="#433b35" stroke-width="4"/>
  <rect x="463" y="250" width="274" height="342" rx="28" fill="url(#panel)" stroke="#433b35" stroke-width="4"/>
  <rect x="810" y="110" width="274" height="482" rx="28" fill="url(#panel)" stroke="#433b35" stroke-width="4"/>
  <text x="154" y="244" fill="#b5aca4" font-family="Arial, sans-serif" font-size="24" letter-spacing="4">ACT I</text>
  <text x="154" y="314" fill="#fff8f2" font-family="Georgia, serif" font-size="54">Opening</text>
  <text x="154" y="364" fill="#fff8f2" font-family="Georgia, serif" font-size="54">Beat</text>
  <text x="154" y="448" fill="#c9c2bc" font-family="Georgia, serif" font-size="30">Ordinary objective,</text>
  <text x="154" y="488" fill="#c9c2bc" font-family="Georgia, serif" font-size="30">small accumulating wrongness.</text>
  <text x="501" y="322" fill="#b5aca4" font-family="Arial, sans-serif" font-size="24" letter-spacing="4">ACT II</text>
  <text x="501" y="392" fill="#fff8f2" font-family="Georgia, serif" font-size="54">Midgame</text>
  <text x="501" y="442" fill="#fff8f2" font-family="Georgia, serif" font-size="54">Pressure</text>
  <text x="501" y="526" fill="#c9c2bc" font-family="Georgia, serif" font-size="30">Familiar ground,</text>
  <text x="501" y="566" fill="#c9c2bc" font-family="Georgia, serif" font-size="30">worse conditions.</text>
  <text x="848" y="182" fill="#b5aca4" font-family="Arial, sans-serif" font-size="24" letter-spacing="4">ACT III</text>
  <text x="848" y="252" fill="#fff8f2" font-family="Georgia, serif" font-size="54">Late</text>
  <text x="848" y="302" fill="#fff8f2" font-family="Georgia, serif" font-size="54">Reveal</text>
  <text x="848" y="386" fill="#c9c2bc" font-family="Georgia, serif" font-size="30">Clues connect,</text>
  <text x="848" y="426" fill="#c9c2bc" font-family="Georgia, serif" font-size="30">choice lands on the cast.</text>
</svg>
