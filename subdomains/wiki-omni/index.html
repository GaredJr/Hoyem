<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Omni Wiki</title>
    <link href="/css/style.css" rel="stylesheet">
  </head>
  <body class="hcenter wikiBody">
    <header class="navbar" id="navbar">
      <!--components/navbar.html-->
    </header>
    <div class="center">
      <div class="wikiPageIntro" id="wiki-page-intro">
        <p class="wikiEyebrow">Omni Wiki</p>
        <h2>Omni Wiki</h2>
        <p>
          Reference notes for controls, characters, places, and story beats. Open any entry from the archive or link directly to it with the URL.
        </p>
      </div>
      <div class="wikiShell" data-wiki-root>
        <section class="wikiArchiveView" id="wiki-archive-view">
          <div class="wikiPanelHeading">
            <h3>Archive</h3>
            <p id="wiki-archive-description">Browse the current Omni entries.</p>
          </div>
          <div class="wikiArchiveList" id="wiki-grid"></div>
        </section>
        <section class="wikiEntryView" id="wiki-entry-view" hidden>
          <div class="wikiArticleToolbar">
            <button class="wikiBackButton" id="wiki-reset" type="button" hidden>Back to archive</button>
            <p class="wikiArticleStatus" id="wiki-status">Archive</p>
          </div>
          <div class="wikiEntryLayout">
            <article class="wikiArticle" aria-live="polite">
              <div class="wikiArticleBody" id="wiki-article-body"></div>
            </article>
            <aside class="wikiEntryAside">
              <div class="wikiEntryAsideBlock">
                <p class="wikiAsideLabel">Archive</p>
                <nav class="wikiEntryList" id="wiki-sidebar-list" aria-label="Archive entries"></nav>
              </div>
            </aside>
          </div>
        </section>
      </div>
    </div>
    <p id="copyright">
      <!--components/copyright.html-->
    </p>
    <script src="/scripts/main.js"></script>
    <script src="/scripts/wiki-omni.js"></script>
  </body>
</html>
